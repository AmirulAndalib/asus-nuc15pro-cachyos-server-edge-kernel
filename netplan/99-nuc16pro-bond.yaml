# Canonical 802.3ad (LACP) bond for the NUC 16 Pro's two Intel I226-V 2.5GbE ports.
#
# MANUAL one-time setup, applied by scripts/nuc16pro-bond-apply.sh - deliberately NOT
# deployed by the daily kernel updater. Auto-applying a bond unattended could leave the box
# unreachable on the next reboot if the upstream switch LAG is ever changed/removed.
#
# Prerequisite: the upstream managed switch (e.g. Grandstream GWN7721) must have a matching
# 802.3ad LAG group on the two ports the NICs connect to. Without the switch side, LACP will
# not form and the bond will not pass traffic.
#
# The bond MAC is cloned from enp87s0 so the DHCP lease / 192.168.8.13 (router port-forwards
# and one pinned service) is preserved. WiFi (wlo1) stays a separate failover path.
#
# Reality: a single stream still caps at one link's 2.5 Gbps; LACP aggregates across multiple
# concurrent flows, and RX distribution is chosen by the switch's hash policy.
network:
  version: 2
  renderer: NetworkManager
  ethernets:
    enp86s0:
      match: {macaddress: "48:21:0b:7e:24:2c"}
      set-name: enp86s0
    enp87s0:
      match: {macaddress: "48:21:0b:7e:24:2b"}
      set-name: enp87s0
  bonds:
    bond0:
      interfaces: [enp86s0, enp87s0]
      macaddress: "48:21:0b:7e:24:2b"
      dhcp4: true
      dhcp6: true
      parameters:
        mode: 802.3ad
        lacp-rate: fast
        mii-monitor-interval: 100
        transmit-hash-policy: layer3+4
